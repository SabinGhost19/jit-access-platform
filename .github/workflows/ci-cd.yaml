name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - "operator/**"
      - "helm/jit-access/**"
      - ".github/workflows/ci-cd.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "operator/**"
      - "helm/jit-access/**"
      - ".github/workflows/ci-cd.yaml"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-operator:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Downcase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.REPO_LC }}-operator
          tags: |
            type=sha,format=short

      # Build and push Operator
      - name: Build and push Operator
        uses: docker/build-push-action@v5
        with:
          context: ./operator
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ env.REGISTRY }}/${{ env.REPO_LC }}-operator:sha-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

  update-helm-values:
    needs: build-and-push-operator
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Helm values tag
        env:
          TAG: sha-${{ github.sha }}
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq
          yq e '.operator.image.tag = strenv(TAG)' -i helm/jit-access/values.yaml

      - name: Commit and push updated values
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/jit-access/values.yaml
          git commit -m "chore(helm): update operator image tag to sha-${{ github.sha }} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push
