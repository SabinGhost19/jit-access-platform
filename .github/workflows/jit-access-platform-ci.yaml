name: jit-access-platform-ci

on:
  push:
    branches: [ "main" ]
    paths:
      - "operator/**"
      - "helm/jit-access/**"
      - ".github/workflows/jit-access-platform-ci.yaml"
  pull_request:
    paths:
      - "operator/**"
      - "helm/jit-access/**"
      - ".github/workflows/jit-access-platform-ci.yaml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_PATH: helm/jit-access
  CHART_NAME: jit-access

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ${{ env.CHART_PATH }}

  helm-template:
    runs-on: ubuntu-latest
    needs: [ helm-lint ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm template validation
        run: helm template jit-access ${{ env.CHART_PATH }} --namespace jit-system >
          /tmp/jit-rendered.yaml

      - name: Check rendered output is not empty
        run: test -s /tmp/jit-rendered.yaml

  version-tag:
    runs-on: ubuntu-latest
    needs: [ helm-lint, helm-template ]
    if: github.event_name != 'pull_request'
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump semver tag
        id: bump
        continue-on-error: true
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch
          release_branches: main

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          git fetch --tags --force
          if [[ -n "${{ steps.bump.outputs.new_tag }}" ]]; then
            release_tag="${{ steps.bump.outputs.new_tag }}"
            release_version="${{ steps.bump.outputs.new_version }}"
          else
            release_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
            if [[ -z "$release_tag" ]]; then
              echo "No release tag available." >&2
              exit 1
            fi
            release_version="${release_tag#v}"
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

      - name: Version summary
        run: |
          echo "Release tag: ${{ steps.resolve.outputs.release_tag }}" >> $GITHUB_STEP_SUMMARY

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: [ version-tag ]
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - component: operator
            context: ./operator
            dockerfile: ./operator/Dockerfile
            image_name: jit-access-platform-operator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image repository
        id: imagevars
        shell: bash
        run: |
          echo "image_repo=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imagevars.outputs.image_repo }}
          tags: |
            type=raw,value=${{ needs.version-tag.outputs.release_tag }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summary
        run: |
          echo "Component: ${{ matrix.component }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  update-chart-values:
    runs-on: ubuntu-latest
    needs: [ version-tag, build-and-push-images ]
    if: github.event_name != 'pull_request' && github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Update operator tag in Helm values
        env:
          TAG: ${{ needs.version-tag.outputs.release_tag }}
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq

          yq e '.operator.image.tag = strenv(TAG)' -i helm/jit-access/values.yaml

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add helm/jit-access/values.yaml
          git commit -m "chore(helm): update operator image tag to ${TAG} [skip ci]" || echo "No changes to commit"
          git pull --rebase origin main
          git push

  package-and-push-chart:
    runs-on: ubuntu-latest
    needs: [helm-lint, helm-template, update-chart-values]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main after values update
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Normalize chart registry path
        id: chartvars
        shell: bash
        run: |
          echo "chart_repo=oci://${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/charts" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: |
          mkdir -p /tmp/chart-dist
          helm package ${{ env.CHART_PATH }} --destination /tmp/chart-dist

      - name: Login Helm registry (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR OCI
        run: |
          helm push /tmp/chart-dist/${{ env.CHART_NAME }}-*.tgz ${{ steps.chartvars.outputs.chart_repo }}

      - name: Chart summary
        run: |
          echo "Pushed Helm chart:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.chartvars.outputs.chart_repo }}/${{ env.CHART_NAME }}" >> $GITHUB_STEP_SUMMARY
