name: jit-access-platform-ci

on:
  push:
    branches: ["main"]
    paths:
      - "operator/**"
      - "backend/**"
      - "frontend/**"
      - "helm/jit-access/**"
      - ".github/workflows/jit-access-platform-ci.yaml"
  pull_request:
    paths:
      - "operator/**"
      - "backend/**"
      - "frontend/**"
      - "helm/jit-access/**"
      - ".github/workflows/jit-access-platform-ci.yaml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_PATH: helm/jit-access
  CHART_NAME: jit-access

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint ${{ env.CHART_PATH }}

  helm-template:
    runs-on: ubuntu-latest
    needs: helm-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm template validation
        run: helm template jit-access ${{ env.CHART_PATH }} --namespace jit-system > /tmp/jit-rendered.yaml

      - name: Check rendered output is not empty
        run: test -s /tmp/jit-rendered.yaml

  version-tag:
    runs-on: ubuntu-latest
    needs: [helm-lint, helm-template]
    if: github.event_name != 'pull_request'
    outputs:
      release_tag: ${{ steps.bump.outputs.new_tag }}
      release_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump semver tag
        id: bump
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: patch
          release_branches: main

      - name: Version summary
        run: |
          echo "Generated release tag: ${{ steps.bump.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: [version-tag]
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        include:
          - component: operator
            context: ./operator
            dockerfile: ./operator/Dockerfile
            image_name: jit-access-platform-operator
          - component: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image_name: jit-access-platform-backend
          - component: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image_name: jit-access-platform-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image repository
        id: imagevars
        shell: bash
        run: |
          echo "image_repo=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.image_name }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imagevars.outputs.image_repo }}
          tags: |
            type=raw,value=${{ needs.version-tag.outputs.release_tag }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push ${{ matrix.component }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Summary
        run: |
          echo "Component: ${{ matrix.component }}" >> $GITHUB_STEP_SUMMARY
          echo "Tags:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  package-and-push-chart:
    runs-on: ubuntu-latest
    needs: [version-tag]
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Normalize chart registry path
        id: chartvars
        shell: bash
        run: |
          echo "chart_repo=oci://${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/charts" >> "$GITHUB_OUTPUT"

      - name: Package Helm chart
        run: |
          mkdir -p /tmp/chart-dist
          helm package ${{ env.CHART_PATH }} --destination /tmp/chart-dist --version ${{ needs.version-tag.outputs.release_version }} --app-version ${{ needs.version-tag.outputs.release_version }}

      - name: Login Helm registry (GHCR)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Push Helm chart to GHCR OCI
        run: |
          helm push /tmp/chart-dist/${{ env.CHART_NAME }}-*.tgz ${{ steps.chartvars.outputs.chart_repo }}

      - name: Chart summary
        run: |
          echo "Pushed Helm chart tag: ${{ needs.version-tag.outputs.release_version }}" >> $GITHUB_STEP_SUMMARY
