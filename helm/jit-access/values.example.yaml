nameOverride: ""
fullnameOverride: ""

adminUI:
  enabled: true

operator:
  replicaCount: 1
  image:
    repository: ghcr.io/sabinghost19/jit-access-platform-operator
    tag: v0.0.2
    pullPolicy: IfNotPresent
  serviceAccount:
    create: true
    name: ""

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/sabinghost19/jit-access-platform-backend
    tag: v0.0.2
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  jwt:
    secretKey: "m10oi23jn21983n21nd09n9own09122dm-mecelmkodmsa09d202dlsmnajksda"
    algorithm: HS256
    expireMinutes: 120
  sqlite:
    mountPath: /data
    fileName: jit_audit.db

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/sabinghost19/jit-access-platform-frontend
    tag: v0.0.2
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80

adminAuth:
  # Recomandat in productie: foloseste existingSecret, nu plaintext in values.
  # Secretul trebuie sa contina cheile: username, password
  existingSecret: ""

  # Folosite doar daca existingSecret este gol.
  username: admin
  password: "CHANGE_ME_STRONG_PASSWORD"

securityPolicies:
  blockedUsers:
    - "blocked.user@company.com"
    - "compromised.user@company.com"
  antiAbuse:
    maxActiveSessions: 1
    cooldownMinutes: 15
    maxRequestsPerDay: 5
    maxDurationMinutes: 120

ingress:
  enabled: false
  className: nginx
  host: jit-access.example.com
  path: /
  pathType: Prefix
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "10.0.0.0/8,192.168.0.0/16"
    nginx.ingress.kubernetes.io/limit-rps: "20"
  tls:
    - hosts:
        - jit-access.example.com
      secretName: jit-access-tls
