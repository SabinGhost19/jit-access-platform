{{- if .Values.adminUI.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "jit-access.fullname" . }}-backend
  labels:
    {{- include "jit-access.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "jit-access.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jit-access.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "jit-access.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jit-access.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "jit-access.fullname" . }}-backend
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "jit-access.fullname" . }}-backend
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "jit-access.fullname" . }}-backend-killswitch
  labels:
    {{- include "jit-access.labels" . | nindent 4 }}
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "jit-access.fullname" . }}-backend-killswitch
  labels:
    {{- include "jit-access.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "jit-access.fullname" . }}-backend
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "jit-access.fullname" . }}-backend-killswitch
{{- end }}
