apiVersion: v1
kind: ConfigMap
metadata:
  name: jit-security-policies
  labels:
    {{- include "jit-access.labels" . | nindent 4 }}
data:
  blockedUsers.json: |
    {{- .Values.securityPolicies.blockedUsers | toJson | nindent 4 }}
  antiAbuse.json: |
    {
      "maxActiveSessions": {{ .Values.securityPolicies.antiAbuse.maxActiveSessions }},
      "cooldownMinutes": {{ .Values.securityPolicies.antiAbuse.cooldownMinutes }},
      "maxRequestsPerDay": {{ .Values.securityPolicies.antiAbuse.maxRequestsPerDay }},
      "maxDurationMinutes": {{ .Values.securityPolicies.antiAbuse.maxDurationMinutes }}
    }
