{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "jit-access.fullname" . }}
rules:
  # Required by kopf to verify CRD existence at startup
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["rolebindings"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  # Allow binding ClusterRoles that the operator is authorised to grant (no escalation).
  # resourceNames limits the scope: operator can only bind 'view' and 'edit', never admin/cluster-admin.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles"]
    verbs: ["bind"]
    resourceNames: ["view", "edit"]
  - apiGroups: ["devsecops.licenta.ro"]
    resources: ["jitaccessrequests"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["devsecops.licenta.ro"]
    resources: ["jitaccessrequests/status", "jitaccessrequests/finalizers"]
    verbs: ["get", "patch", "update"]
{{- end }}
