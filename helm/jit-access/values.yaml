operator:
  image:
    repository: ghcr.io/sabinghost19/jit-access-platform-operator
    tag: sha-d14798d83a173cac10e0e9359f77e4c7111185ae
    pullPolicy: IfNotPresent
  resources: {}
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
  podSecurityContext:
    fsGroup: 10001
  env:
    requestNamespace: default
    policiesConfigMap: jit-security-policies
serviceAccount:
  create: true
  name: ""
rbac:
  create: true
replicaCount: 1
persistence:
  enabled: true
  existingClaim: ""
  size: 1Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
policiesConfigMap:
  create: true
  name: jit-security-policies
  blockedUsers: []
  antiAbuse:
    maxActiveSessions: 1
    cooldownMinutes: 15
    maxRequestsPerDay: 5
    maxDurationMinutes: 120
nodeSelector: {}
tolerations: []
affinity: {}
